
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>깜짝 메시지</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    img {
      width: 100%;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 12px;
    }

    p {
      font-size: 18px;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="card">
    <!-- 🔥 여기 이미지 이름 맞춰 -->
    <img src="image.jpeg" alt="사진">

    <h1>구라입니다 </h1>
    <p>히히 속았지?</p>
  </div>

</body>
</html>
